let voicesLoaded = false;
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => { voicesLoaded = true; };
  window.speechSynthesis.getVoices();
}
function speak(text, rate=0.78) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const vs = window.speechSynthesis.getVoices();
  u.voice = vs.find(v=>v.lang.startsWith("da")) || vs.find(v=>v.lang.startsWith("nb")) || vs.find(v=>v.lang.startsWith("sv")) || null;
  u.lang = "da-DK"; u.rate = rate; u.pitch = 1;
  window.speechSynthesis.speak(u);
}
function lev(a,b) {
  const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

let chatHistory = [];
async function askTutor(userMsg, lesson) {
  chatHistory.push({role:"user", content: userMsg});
  const body = {
    model: "claude-sonnet-4-6",
    max_tokens: 500,
    system: `You are a warm Danish PD2 tutor. Student: Indian, 44 yrs, speaks English/Hindi/Telugu, exam summer 2027, 30 min/day.
Today's lesson: "${lesson.title}". Vocab: ${lesson.vocab.map(v=>v.da+"("+v.en+")").join(", ")}.
Rules: under 200 words · pronunciation in [brackets] after new words · compare to Hindi/Telugu when helpful · be encouraging`,
    messages: chatHistory
  };
  const headers = {"Content-Type":"application/json"};
  if (API_KEY && API_KEY !== "YOUR_ANTHROPIC_API_KEY_HERE") headers["x-api-key"] = API_KEY;
  const res = await fetch("https://api.anthropic.com/v1/messages", {method:"POST", headers, body:JSON.stringify(body)});
  if (!res.ok) { const e=await res.json().catch(()=>{}); throw new Error(e?.error?.message||"HTTP "+res.status); }
  const data = await res.json();
  const reply = data.content?.find(c=>c.type==="text")?.text || "No response";
  chatHistory.push({role:"assistant", content: reply});
  return reply;
}

function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}
function div(attrs, ...children) { return el("div", attrs, ...children); }
function btn(attrs, text) { return el("button", attrs, text); }
function span(s, t) { const e=document.createElement("span"); Object.assign(e.style,s); e.textContent=t; return e; }

function makeVocabCard(item) {
  let flipped = false;

  const top = div({style:{display:"flex",alignItems:"flex-start",gap:"8px"}});
  const content = div({style:{flex:"1",cursor:"pointer"}});
  const daWord = span({fontSize:"19px",fontWeight:"800",color:"#0F2A3A",fontFamily:"Georgia,serif",display:"block"},item.da);
  const pronHint = span({fontSize:"12px",color:"#AAA",display:"block",marginTop:"2px"},"/"+item.pron+"/ · tap to reveal");
  content.appendChild(daWord); content.appendChild(pronHint);

  let feedbackEl = null;
  const fbDiv = div({style:{marginTop:"8px"}});

  content.onclick = () => {
    flipped = !flipped;
    if (flipped) {
      card.style.background = "#0F2A3A";
      card.style.borderColor = "#4ECDC4";
      daWord.style.color = "#4ECDC4";
      pronHint.innerHTML = "";
      const pronSpan = span({fontSize:"13px",color:"#7EC8C8",fontStyle:"italic",display:"block"},"/"+item.pron+"/");
      const enSpan = span({fontSize:"15px",fontWeight:"600",color:"white",display:"block",marginTop:"3px"},item.en);
      const hintSpan = span({fontSize:"12px",color:"#A3C4CC",display:"block",marginTop:"5px"},"💡 "+item.hint);
      pronHint.appendChild(pronSpan); pronHint.appendChild(enSpan); pronHint.appendChild(hintSpan);
    } else {
      card.style.background = "white";
      card.style.borderColor = "#E8E4DC";
      daWord.style.color = "#0F2A3A";
      pronHint.innerHTML = "/"+item.pron+"/ · tap to reveal";
    }
  };

  const btns = div({style:{display:"flex",flexDirection:"column",gap:"5px",flexShrink:"0"}});
  const spkBtn = btn({style:{width:"34px",height:"34px",borderRadius:"50%",border:"none",background:"#E8F8F5",fontSize:"16px",cursor:"pointer"}, onClick:(e)=>{e.stopPropagation();speak(item.da);}}, "🔊");

  let recActive = false;
  const micBtn = btn({style:{width:"34px",height:"34px",borderRadius:"50%",border:"none",background:"#FEF3E2",fontSize:"16px",cursor:"pointer"}}, "🎤");
  micBtn.onclick = (e) => {
    e.stopPropagation();
    fbDiv.innerHTML = "";
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showFb(fbDiv, null, "Speech recognition needs Chrome browser"); return; }
    if (currentRecognition) { try{currentRecognition.stop();}catch(e){} }
    const rec = new SR();
    rec.lang = "da-DK"; rec.interimResults=false; rec.maxAlternatives=5;
    currentRecognition = rec;
    rec.onstart = () => { micBtn.textContent="⏹"; micBtn.style.background="#E74C3C"; micBtn.style.animation="pulse 0.8s infinite"; };
    rec.onend = () => { micBtn.textContent="🎤"; micBtn.style.background="#FEF3E2"; micBtn.style.animation=""; };
    rec.onresult = (ev) => {
      const alts = Array.from(ev.results[0]).map(r=>r.transcript.toLowerCase().trim());
      const target = item.da.toLowerCase().replace(/[?.!,]/g,"").trim();
      const ok = alts.some(h => { const c=h.replace(/[?.!,]/g,"").trim(); return c===target||c.includes(target)||target.includes(c)||lev(c,target)<=Math.ceil(target.length*0.35); });
      showFb(fbDiv, ok, ok ? "✅ Great pronunciation!" : `❌ I heard: "${alts[0]}" — try again`);
    };
    rec.onerror = (ev) => showFb(fbDiv, null, "Mic error: "+ev.error+". Allow mic in Settings > Safari.");
    rec.start();
  };
  btns.appendChild(spkBtn); btns.appendChild(micBtn);
  top.appendChild(content); top.appendChild(btns);
  card.appendChild(top); card.appendChild(fbDiv);
  return card;
}

function renderQuizQuestion(card, questions, lesson) {
  const q = questions[quizState.cur];
  const hdr = div({style:{display:"flex",justifyContent:"space-between",marginBottom:"10px"}});

  card.appendChild(hdr);
  card.appendChild(span({fontSize:"15px",fontWeight:"700",color:"#0F2A3A",display:"block",marginBottom:"14px",lineHeight:"1.5"},q.q));

  q.options.forEach((opt, i) => {
    let bg="white",border="1px solid #E8E4DC",col="#333";
    if (quizState.sel !== null) {
      if (i===q.ans){bg="#D5F5E3";border="2px solid #2E7D6E";col="#2E7D6E";}
      else if(i===quizState.sel){bg="#FADBD8";border="2px solid #C0392B";col="#C0392B";}
    }
    const ob = btn({style:{display:"block",width:"100%",textAlign:"left",padding:"12px 14px",borderRadius:"10px",marginBottom:"8px",
      background:bg,border,color:col,fontSize:"14px",fontWeight:"500",cursor:quizState.sel!==null?"default":"pointer",transition:"all 0.2s"},
      onClick:()=>{
        if(quizState.sel!==null) return;
        const correct = i===q.ans;
        quizState.sel = i;
        if(correct) quizState.score++;
        render();
        setTimeout(()=>{
          if(quizState.cur+1>=questions.length){
            quizState.finalScore=quizState.score; quizState.done=true;
            markSection("quiz", quizState.score, questions.length);
          } else { quizState.cur++; quizState.sel=null; }
          render();
        }, 1100);
      }}, opt);
    card.appendChild(ob);
  });
}

function markSection(sec, qs, qt) {
  const today=todayStr();
  const todayP = STATE.progress[today]||{};
  STATE.progress[today] = {...todayP,[sec]:true,title:getLesson().title};
  if(STATE.progress[today].vocab && STATE.progress[today].grammar && STATE.progress[today].quiz){
    const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
    STATE.streak=(STATE.lastDate===yest?STATE.streak:0)+1;
    STATE.lastDate=today;
    STATE.progress[today].completed=true;
  }
  if(sec==="quiz"&&qs!==undefined){
    const arr=[...(STATE.weakTopics[getLesson().title]||[]),qs/qt].slice(-5);
    STATE.weakTopics[getLesson().title]=arr;
  }
  saveState();
}

// ── PRONUNCIATION ──────────────────────────────────────
function renderPron(body, lesson) {
  const item = lesson.vocab[pronIdx];
  const card = div({class:"card"});
  card.appendChild(span({fontSize:"15px",fontWeight:"700",display:"block",marginBottom:"2px"},"🗣️ Pronunciation Practice"));
  card.appendChild(span({fontSize:"12px",color:"#888",display:"block",marginBottom:"16px"},
    pronDone.size+"/"+lesson.vocab.length+" cleared · Listen → Repeat → Tap 🎤"));

  const wordBox = div({style:{textAlign:"center",padding:"20px 0"}});
  wordBox.appendChild(span({fontSize:"38px",fontWeight:"900",color:"#0F2A3A",fontFamily:"Georgia,serif",display:"block"},item.da));
  wordBox.appendChild(span({fontSize:"16px",color:"#666",display:"block",marginTop:"4px"},"/"+item.pron+"/"));
  wordBox.appendChild(span({fontSize:"14px",color:"#888",display:"block",marginTop:"2px"},item.en));
  wordBox.appendChild(span({fontSize:"12px",color:"#AAA",fontStyle:"italic",display:"block",marginTop:"6px"},item.hint));
  card.appendChild(wordBox);

  const fbDiv = div({});
  const btnRow = div({style:{display:"flex",gap:"10px",justifyContent:"center",marginBottom:"12px"}});

  const hearBtn = btn({style:{padding:"12px 24px",background:"#0F2A3A",color:"white",border:"none",borderRadius:"30px",fontSize:"15px",fontWeight:"700",cursor:"pointer"},
    onClick:()=>speak(item.da)}, "🔊 Hear it");

  let recActive=false;
  const sayBtn = btn({style:{padding:"12px 24px",background:"#2E7D6E",color:"white",border:"none",borderRadius:"30px",fontSize:"15px",fontWeight:"700",cursor:"pointer"}}, "🎤 Say it");
  sayBtn.onclick = () => {
    fbDiv.innerHTML="";
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){showFb(fbDiv,null,"Needs Chrome. Try Chrome app on iPhone.");return;}
    if(currentRecognition){try{currentRecognition.stop();}catch(e){}}
    const rec=new SR();
    rec.lang="da-DK";rec.interimResults=false;rec.maxAlternatives=5;
    currentRecognition=rec;
    rec.onstart=()=>{sayBtn.textContent="⏹ Stop";sayBtn.style.background="#E74C3C";sayBtn.style.animation="pulse 0.8s infinite";};
    rec.onend=()=>{sayBtn.textContent="🎤 Say it";sayBtn.style.background="#2E7D6E";sayBtn.style.animation="";};
    rec.onresult=(ev)=>{
      const alts=Array.from(ev.results[0]).map(r=>r.transcript.toLowerCase().trim());
      const target=item.da.toLowerCase().replace(/[?.!,]/g,"").trim();
      const ok=alts.some(h=>{const c=h.replace(/[?.!,]/g,"").trim();return c===target||c.includes(target)||target.includes(c)||lev(c,target)<=Math.ceil(target.length*0.35);});
      showFb(fbDiv,ok,ok?"✅ Excellent! Great Danish pronunciation!":` ❌ I heard: "${alts[0]}" — listen again and retry`);
      if(ok)pronDone.add(pronIdx);
    };
    rec.onerror=(ev)=>showFb(fbDiv,null,"Mic: "+ev.error+". On iPhone: Settings → Safari → Microphone → Allow");
    rec.start();
  };
  btnRow.appendChild(hearBtn); btnRow.appendChild(sayBtn);
  card.appendChild(btnRow); card.appendChild(fbDiv);

  // Dots nav
  const dots = div({style:{display:"flex",gap:"6px",justifyContent:"center",margin:"12px 0"}});
  lesson.vocab.forEach((_,i)=>{
    const d=div({style:{width:"12px",height:"12px",borderRadius:"50%",cursor:"pointer",
      background:pronDone.has(i)?"#2E7D6E":i===pronIdx?"#0F2A3A":"#DDD",transition:"background 0.2s"}});
    d.onclick=()=>{pronIdx=i;fbDiv.innerHTML="";render();};
    dots.appendChild(d);
  });
  card.appendChild(dots);

  const navRow = div({style:{display:"flex",gap:"8px"}});
  const prevB = btn({style:{flex:"1",padding:"10px",background:pronIdx===0?"#EEE":"#F0EDE6",color:pronIdx===0?"#CCC":"#333",border:"none",borderRadius:"8px",fontWeight:"700",cursor:pronIdx===0?"default":"pointer"},
    onClick:()=>{if(pronIdx>0){pronIdx--;fbDiv.innerHTML="";render();}}}, "← Prev");
  const nextB = btn({style:{flex:"1",padding:"10px",background:pronIdx===lesson.vocab.length-1?"#EEE":"#0F2A3A",color:pronIdx===lesson.vocab.length-1?"#CCC":"white",border:"none",borderRadius:"8px",fontWeight:"700",cursor:pronIdx===lesson.vocab.length-1?"default":"pointer"},
    onClick:()=>{if(pronIdx<lesson.vocab.length-1){pronIdx++;fbDiv.innerHTML="";render();}}}, "Next →");
  navRow.appendChild(prevB); navRow.appendChild(nextB);
  card.appendChild(navRow);
  body.appendChild(card);

  const tip = div({class:"card",style:{background:"#E8F4FD",border:"1px solid #AED6F1"}});
  tip.appendChild(span({fontSize:"13px",fontWeight:"700",color:"#1A5276",display:"block",marginBottom:"6px"},"💡 Pronunciation tips for Indian speakers"));
  [
    "Soft 'd' (in mad, ved, god) → sounds like English 'th' — say 'math' not 'mad'",
    "Ø → round lips to say 'o' but try to say 'e'",
    "Danish 'r' → guttural, back of throat, like gentle throat-clearing",
    "Silent letters common: hvid (veed), hånd (hon), tog (toh)",
    "Speech recognition works best in Chrome on Android/desktop"
  ].forEach(t=>{
    tip.appendChild(span({fontSize:"12px",color:"#1A5276",display:"block",marginBottom:"4px"},"• "+t));
  });
  body.appendChild(tip);
  // pulse style
  if (!document.getElementById("pulsestyle")) {
    const s=document.createElement("style"); s.id="pulsestyle";
    s.textContent="@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}";
    document.head.appendChild(s);
  }
}

// ── PROGRESS ────────────────────────────────────────────
function renderProgress(body, dp, completed) {
  const statsRow = div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"14px"}});
  [["\uD83D\uDD25",STATE.streak,"Streak"],["✅",completed,"Days Done"],["📅",dp,"Days In"]].forEach(([ic,val,lb])=>{
    const c=div({class:"card",style:{textAlign:"center",padding:"12px 8px"}});
    c.appendChild(span({fontSize:"20px",display:"block"},ic));
    c.appendChild(span({fontSize:"22px",fontWeight:"900",color:"#0F2A3A",display:"block"},val));
    c.appendChild(span({fontSize:"11px",color:"#888",display:"block"},lb));
    statsRow.appendChild(c);
  });
  body.appendChild(statsRow);

  const roadCard = div({class:"card"});
  roadCard.appendChild(span({fontSize:"15px",fontWeight:"700",display:"block",marginBottom:"12px"},"🗓️ 1-Year Roadmap to PD2"));
  [{label:"Phase 1: Foundations",period:"Jun–Sep 2026",color:"#2E7D6E",s:0,e:119},
   {label:"Phase 2: Building Blocks",period:"Oct–Dec 2026",color:"#1A5276",s:119,e:210},
   {label:"Phase 3: Intermediate",period:"Jan–Mar 2027",color:"#6C3483",s:210,e:301},
   {label:"Phase 4: Exam Ready",period:"Apr–Jun 2027",color:"#B7410E",s:301,e:382}
  ].forEach(ph=>{
    const elapsed=Math.min(ph.e-ph.s,Math.max(0,dp-ph.s));
    const pct=Math.round((elapsed/(ph.e-ph.s))*100);
    const active=dp>=ph.s&&dp<ph.e;
    const row=div({style:{marginBottom:"12px"}});
    const hdr=div({style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}});
    hdr.appendChild(span({fontSize:"13px",fontWeight:active?"700":"500",color:active?"#0F2A3A":"#888"},(active?"▶ ":"")+ph.label));
    hdr.appendChild(span({fontSize:"11px",color:"#888"},ph.period));
    row.appendChild(hdr);
    const bar=div({style:{background:"#F0EDE6",borderRadius:"4px",height:"8px"}});
    bar.appendChild(div({style:{width:pct+"%",background:ph.color,height:"100%",borderRadius:"4px"}}));
    row.appendChild(bar);
    row.appendChild(span({fontSize:"11px",color:"#AAA",display:"block",marginTop:"2px"},pct+"%"));
    roadCard.appendChild(row);
  });
  body.appendChild(roadCard);

  const histCard = div({class:"card"});
  histCard.appendChild(span({fontSize:"15px",fontWeight:"700",display:"block",marginBottom:"10px"},"📋 Recent Sessions"));
  const entries = Object.entries(STATE.progress).slice(-6).reverse();
  if (entries.length===0) {
    histCard.appendChild(span({fontSize:"13px",color:"#AAA",display:"block",textAlign:"center",padding:"16px"},"Complete your first lesson to see history."));
  } else {
    entries.forEach(([date,p])=>{
      const row=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #F0EDE6"}});
      const left=div({});
      left.appendChild(span({fontSize:"13px",fontWeight:"600",display:"block"},p.title||"Lesson"));
      left.appendChild(span({fontSize:"11px",color:"#888",display:"block"},date));
      row.appendChild(left);
      row.appendChild(span({display:"inline-block",padding:"3px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:"700",
        background:p.completed?"#D5F5E3":"#FEF9E7",color:p.completed?"#2E7D6E":"#E67E22"},p.completed?"✓ Done":"Partial"));
      histCard.appendChild(row);
    });
  }
  body.appendChild(histCard);

  const weak=Object.entries(STATE.weakTopics).map(([t,arr])=>({t,avg:arr.reduce((a,b)=>a+b,0)/arr.length})).filter(w=>w.avg<0.7).sort((a,b)=>a.avg-b.avg);
  if(weak.length>0){
    const wc=div({class:"card",style:{background:"#FEF3E2",border:"1px solid #F7DC6F"}});
    wc.appendChild(span({fontSize:"14px",fontWeight:"700",display:"block",marginBottom:"8px"},"⚠️ Review These Topics"));
    weak.forEach(w=>{
      const row=div({style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #F7E794"}});
      row.appendChild(span({fontSize:"13px"},w.t));
      row.appendChild(span({fontSize:"12px",color:"#E74C3C",fontWeight:"700"},Math.round(w.avg*100)+"% quiz score"));
      wc.appendChild(row);
    });
    wc.appendChild(span({fontSize:"12px",color:"#888",display:"block",marginTop:"8px"},"Ask the AI Tutor to drill you on these!"));
    body.appendChild(wc);
  }
}

// ── TUTOR ───────────────────────────────────────────────
function renderTutor(body, lesson) {
  const card = div({class:"card"});
  card.appendChild(span({fontSize:"14px",fontWeight:"700",display:"block",marginBottom:"2px"},"🤖 Din Dansklærer — AI Tutor"));
  card.appendChild(span({fontSize:"12px",color:"#888",display:"block",marginBottom:"10px"},"Today: "+lesson.title+" · Powered by Claude"));

  // Quick prompts
  const qps = div({style:{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"12px"}});
  ["Explain today's grammar again","Give me 5 more examples","Compare to Hindi grammar","Quiz me on today's vocab","PD2 exam tip","Trickiest pronunciation today"].forEach(q=>{
    qps.appendChild(btn({style:{fontSize:"11px",padding:"5px 10px",background:"#F0EDE6",color:"#333",border:"1px solid #DDD",borderRadius:"20px",cursor:"pointer"},
      onClick:()=>sendToTutor(q,lesson,chatDiv,spinnerEl)},q));
  });
  card.appendChild(qps);

  const chatDiv = div({style:{maxHeight:"280px",overflowY:"auto",marginBottom:"10px"}});
  if (chatHistory.length===0) {
    const welcome = div({style:{color:"#AAA",fontSize:"13px",textAlign:"center",padding:"20px 0"}});
    welcome.textContent="Ask anything about Danish, today's lesson, or PD2!";
    chatDiv.appendChild(welcome);
  } else {
    chatHistory.forEach(m=>{
      const mb=div({style:{marginBottom:"10px",padding:"10px 13px",borderRadius:"10px",fontSize:"13px",lineHeight:"1.65",whiteSpace:"pre-wrap",
        background:m.role==="user"?"#0F2A3A":"#F4F2ED",color:m.role==="user"?"white":"#222",
        marginLeft:m.role==="user"?"20px":"0",marginRight:m.role==="user"?"0":"20px"}});
      mb.textContent=m.content;
      chatDiv.appendChild(mb);
    });
  }
  card.appendChild(chatDiv);

  const spinnerEl = div({style:{color:"#888",fontSize:"13px",fontStyle:"italic",padding:"4px 0",display:"none"}});
  spinnerEl.textContent="🇩🇰 Tænker... (thinking...)";
  card.appendChild(spinnerEl);

  const inputRow = div({style:{display:"flex",gap:"8px"}});
  const inp = el("input",{type:"text",placeholder:"Ask anything...",style:{flex:"1",padding:"10px 12px",borderRadius:"8px",border:"1px solid #DDD",fontSize:"13px",outline:"none"}});
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&inp.value.trim()) sendToTutor(inp.value.trim(),lesson,chatDiv,spinnerEl,inp);});
  const sendB = btn({style:{padding:"10px 14px",background:"#0F2A3A",color:"white",border:"none",borderRadius:"8px",fontSize:"13px",fontWeight:"700",cursor:"pointer"},
    onClick:()=>{if(inp.value.trim())sendToTutor(inp.value.trim(),lesson,chatDiv,spinnerEl,inp);}}, "Send");
  inputRow.appendChild(inp); inputRow.appendChild(sendB);
  card.appendChild(inputRow);
  body.appendChild(card);

  // PD2 box
  const pd2=div({class:"card",style:{background:"#0F2A3A",color:"white"}});
  pd2.appendChild(span({fontSize:"13px",fontWeight:"700",color:"#4ECDC4",display:"block",marginBottom:"10px"},"📋 PD2 Exam Format"));
  [["📖","Reading","2 texts (~500 words) + comprehension"],
   ["🎧","Listening","2 audio clips — everyday & formal Danish"],
   ["✍️","Writing","Formal email or essay, 150–200 words"],
   ["🗣️","Speaking","Oral conversation + topic presentation"]
  ].forEach(([ic,skill,desc])=>{
    const row=div({style:{display:"flex",gap:"8px",marginBottom:"8px"}});
    row.appendChild(span({fontSize:"16px"},ic));
    const d=div({});
    d.appendChild(span({fontSize:"12px",fontWeight:"700",color:"#4ECDC4",display:"block"},skill));
    d.appendChild(span({fontSize:"11px",color:"#A3B8C2",display:"block"},desc));
    row.appendChild(d); pd2.appendChild(row);
  });
  pd2.appendChild(div({style:{background:"#162F3E",borderRadius:"8px",padding:"10px",marginTop:"8px"}})).appendChild(
    span({fontSize:"11px",color:"#A3B8C2"},"🎯 Target: Summer 2027 · 30 min/day · ~192 hours total"));
  body.appendChild(pd2);

  // Scroll chat to bottom
  setTimeout(()=>{ chatDiv.scrollTop=chatDiv.scrollHeight; }, 50);
}

async function sendToTutor(msg, lesson, chatDiv, spinnerEl, inputEl) {
  if (inputEl) inputEl.value="";
  // Add user bubble
  const ub=div({style:{marginBottom:"10px",padding:"10px 13px",borderRadius:"10px",fontSize:"13px",lineHeight:"1.65",
    background:"#0F2A3A",color:"white",marginLeft:"20px",whiteSpace:"pre-wrap"}});
  ub.textContent=msg;
  const welcome=chatDiv.querySelector("div[style*='textAlign']");
  if(welcome)welcome.remove();
  chatDiv.appendChild(ub);
  chatDiv.scrollTop=chatDiv.scrollHeight;
  spinnerEl.style.display="block";
  try {
    const reply = await askTutor(msg, lesson);
    const ab=div({style:{marginBottom:"10px",padding:"10px 13px",borderRadius:"10px",fontSize:"13px",lineHeight:"1.65",
      background:"#F4F2ED",color:"#222",marginRight:"20px",whiteSpace:"pre-wrap"}});
    ab.textContent=reply;
    chatDiv.appendChild(ab);
  } catch(e) {
    const err=div({style:{marginBottom:"10px",padding:"10px 13px",borderRadius:"10px",fontSize:"13px",background:"#FADBD8",color:"#C0392B"}});
    err.textContent="⚠️ "+e.message+"\n\nCheck internet connection. If persists, the API key may need updating.";
    chatDiv.appendChild(err);
  }
  spinnerEl.style.display="none";
  chatDiv.scrollTop=chatDiv.scrollHeight;
}
